<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HDNA.app</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 16px;
      margin: 16px 0;
    }
    input {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      margin: 8px 0 12px;
      font-size: 16px;
    }
    button {
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    #result {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>HDNA.app</h1>
  <p><strong>Human Designed, Native AI</strong> — a mock presentation of a two-stage recommendation and profiling system for transition from upskill to hAI-skill.</p>

  <div class="card">
    <h2>Try a simple mock</h2>
    <label for="background"><strong>Background</strong></label><br>
    <input id="background" type="text" placeholder="e.g. java coder">
    <br>
    <button onclick="recommendRole()">Generate mock output</button>

    <div id="result"></div>
  </div>

  <script>
  function recommendRole() {
    const input = document.getElementById("background").value.trim().toLowerCase();
    const result = document.getElementById("result");

    const mappings = {
      "java coder": `
        <p><strong>Profile summary:</strong> strong software logic, debugging and backend development capability</p>
        <p><strong>Suggested transition pathway:</strong> ML engineer</p>
        <p><strong>Recommended next steps:</strong> Python, supervised learning, model evaluation</p>
      `,
      "mechanical engineer": `
        <p><strong>Profile summary:</strong> strong systems thinking, modelling and quantitative reasoning</p>
        <p><strong>Suggested transition pathway:</strong> Predictive maintenance analyst</p>
        <p><strong>Recommended next steps:</strong> Python for technical workflows, regression, time-series forecasting</p>
      `,
      "lab scientist": `
        <p><strong>Profile summary:</strong> strong analytical, experimental and reporting capability</p>
        <p><strong>Suggested transition pathway:</strong> AI-assisted research analyst</p>
        <p><strong>Recommended next steps:</strong> Python, classification, data analysis, model interpretation</p>
      `,
      "network engineer": `
        <p><strong>Profile summary:</strong> strong systems, infrastructure and troubleshooting capability</p>
        <p><strong>Suggested transition pathway:</strong> AI infrastructure specialist</p>
        <p><strong>Recommended next steps:</strong> Python, Linux automation, ML fundamentals, model deployment basics</p>
      `,
      "teacher": `
        <p><strong>Profile summary:</strong> strong communication, planning and learner support capability</p>
        <p><strong>Suggested transition pathway:</strong> AI learning designer</p>
        <p><strong>Recommended next steps:</strong> prompt design, learning analytics, instructional AI tools</p>
      `
    };

    result.innerHTML = mappings[input] || `
      <p><strong>Profile summary:</strong> transferable domain capability detected</p>
      <p><strong>Suggested transition pathway:</strong> AI-enabled domain specialist</p>
      <p><strong>Recommended next steps:</strong> Python, ML fundamentals, model evaluation</p>
    `;
  }
</script>
</body>
</html>
